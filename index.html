<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="description" content="职场 MBTI 测谎局，12 道工位修罗场题，扒出你的上班伪装。" />
    <title>职场 MBTI 幸存者测试</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="screen screen-home is-active" id="homeScreen" aria-labelledby="homeTitle">
        <div class="speed-lines" aria-hidden="true"></div>
        <div class="hero-card panel-shock">
          <p class="eyebrow">WORKPLACE MBTI REPORT</p>
          <h1 id="homeTitle">工位人格<br />测谎局</h1>
          <p class="hero-copy">别再用温柔 MBTI 哄自己了。12 道职场拷问题：开会装死、甩锅自救、加班人设、跨部门拉扯，专扒你上班那层伪装。</p>
          <div class="meme-stage" aria-label="原创职场崩溃漫画主视觉">
            <div class="meme-head">
              <span class="meme-eye"></span>
              <span class="meme-eye meme-eye-right"></span>
              <span class="meme-mouth"></span>
            </div>
            <div class="meme-bubble bubble-left">DDL<br />追我</div>
            <div class="meme-bubble bubble-right">需求<br />又变</div>
            <div class="meme-bubble bubble-callout-left">你是<br />E人？</div>
            <div class="meme-bubble bubble-callout-right">你不像<br />F人！</div>
            <div class="callout callout-three">别装了，题会审判你</div>
            <div class="meme-desk">工位求生中...</div>
          </div>
          <button class="primary-btn" type="button" id="startBtn">开始测谎，看看我多会装</button>
        </div>
        <div class="ticker" aria-hidden="true">
          <span>开会装死指数</span>
          <span>甩锅求生本能</span>
          <span>加班人设崩塌</span>
          <span>工位伪装藏不住</span>
        </div>
      </section>

      <section class="screen screen-quiz" id="quizScreen" aria-labelledby="questionTitle">
        <div class="quiz-topbar">
          <button class="ghost-btn" type="button" id="backBtn">上一题</button>
          <div class="progress-wrap" aria-label="答题进度">
            <span id="progressText">01 / 12</span>
            <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
          </div>
        </div>
        <article class="question-card panel-shock">
          <div class="question-meme" id="questionMeme" aria-hidden="true"></div>
          <p class="question-tag" id="questionTag">会议副本</p>
          <h2 id="questionTitle"></h2>
          <div class="options" id="options"></div>
        </article>
      </section>

      <section class="screen screen-result" id="resultScreen" aria-labelledby="resultType">
        <article class="result-card panel-shock" id="captureCard">
          <p class="eyebrow">YOUR WORKPLACE SURVIVAL TYPE</p>
          <div class="result-header">
            <div>
              <p class="result-label">你的职场 MBTI</p>
              <h2 id="resultType"></h2>
            </div>
            <div class="result-avatar" id="resultAvatar" aria-hidden="true">
              <span class="avatar-sweat"></span>
              <span class="avatar-eye avatar-eye-left"></span>
              <span class="avatar-eye avatar-eye-right"></span>
              <span class="avatar-mouth"></span>
              <span class="avatar-code" id="resultAvatarCode"></span>
            </div>
          </div>
          <h3 id="resultName"></h3>
          <p class="punchline" id="resultPunchline"></p>
          <section class="break-card" aria-label="破防指数">
            <div class="break-head">
              <span>破防指数</span>
              <strong id="breakScore"></strong>
            </div>
            <div class="break-track"><div class="break-bar" id="breakBar"></div></div>
            <p id="resultVerdict"></p>
          </section>
          <div class="result-grid">
            <section>
              <h4>工位必杀技</h4>
              <p id="resultPower"></p>
            </section>
            <section>
              <h4>emo触发键</h4>
              <p id="resultCrash"></p>
            </section>
            <section>
              <h4>同事使用指南</h4>
              <p id="resultManual"></p>
            </section>
          </div>
          <p class="share-quote" id="shareQuote"></p>
          <p class="share-tip">长按截图发群：别解释，解释就是被说中了。</p>
        </article>
        <button class="primary-btn restart-btn" type="button" id="restartBtn">再测一次，看看班味变没变</button>
      </section>
    </main>
    <script src="./js/main.js?v=20260616-2"></script>
  </body>
</html>
